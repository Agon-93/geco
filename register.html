<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Registrati — Geco Leopardino</title>
    <meta name="theme-color" content="#111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:-apple-system,'Segoe UI',sans-serif;
            background:#111; color:#f0f0f0; min-height:100vh;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:24px 20px calc(24px + env(safe-area-inset-bottom));
        }
        .card {
            width:100%; max-width:400px;
            background:#1a1a1a; border:1px solid #2a2a2a;
            border-radius:24px; padding:32px 28px;
        }
        .top-row { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
        .btn-back {
            background:#2a2a2a; border:none; color:#f0f0f0; border-radius:10px;
            width:36px; height:36px; font-size:18px; cursor:pointer; display:flex;
            align-items:center; justify-content:center; flex-shrink:0;
        }
        .top-row h1 { font-size:20px; font-weight:800; }

        .form-group { margin-bottom:14px; }
        label { display:block; font-size:12px; font-weight:700; color:#888; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
        .input-wrap { position:relative; }
        input[type="email"], input[type="password"], input[type="text"] {
            width:100%; background:#111; border:1px solid #2a2a2a; border-radius:12px;
            color:#f0f0f0; padding:13px 16px; font-size:15px; outline:none;
            transition:border-color .2s; -webkit-appearance:none;
        }
        input:focus { border-color:#ff9940; }
        input::placeholder { color:#444; }
        input.err { border-color:rgba(239,68,68,.6); }
        .toggle-pw {
            position:absolute; right:14px; top:50%; transform:translateY(-50%);
            background:none; border:none; color:#555; cursor:pointer; font-size:16px; padding:4px;
        }
        .field-hint { font-size:11px; color:#555; margin-top:5px; }

        .btn-primary {
            width:100%; background:#ff9940; color:#111; border:none;
            border-radius:14px; padding:15px; font-size:16px; font-weight:800;
            cursor:pointer; margin-top:8px; transition:opacity .15s;
        }
        .btn-primary:active { opacity:.8; }
        .btn-primary:disabled { background:#2a2a2a; color:#555; cursor:default; }

        .error-box {
            background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3);
            border-radius:12px; padding:12px 14px; font-size:13px; color:#ef4444;
            margin-bottom:14px; display:none;
        }

        /* Schermata successo */
        .success-screen {
            display:none; text-align:center; padding:16px 0;
        }
        .success-screen .big-emoji { font-size:64px; display:block; margin-bottom:16px; animation:pop .5s cubic-bezier(.34,1.56,.64,1) both; }
        .success-screen h2 { font-size:20px; font-weight:800; margin-bottom:10px; }
        .success-screen p  { font-size:14px; color:#888; line-height:1.6; margin-bottom:20px; }
        .success-screen .email-chip {
            display:inline-block; background:rgba(255,153,64,.12); border:1px solid rgba(255,153,64,.3);
            color:#ff9940; border-radius:20px; padding:6px 16px; font-size:13px; font-weight:700;
            margin-bottom:20px;
        }
        @keyframes pop { from{transform:scale(.2);opacity:0} to{transform:scale(1);opacity:1} }

        .pw-strength { display:flex; gap:4px; margin-top:6px; }
        .pw-bar { height:3px; flex:1; border-radius:2px; background:#2a2a2a; transition:background .3s; }
        .pw-bar.weak   { background:#ef4444; }
        .pw-bar.medium { background:#f59e0b; }
        .pw-bar.strong { background:#22c55e; }

        .link-row { text-align:center; font-size:14px; color:#666; margin-top:16px; }
        .link-row a { color:#ff9940; font-weight:700; text-decoration:none; }

        .spinner {
            display:inline-block; width:18px; height:18px;
            border:2px solid rgba(0,0,0,.2); border-top-color:#111;
            border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle;
        }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>

<div class="card">

    <!-- FORM -->
    <div id="form-section">
        <div class="top-row">
            <button class="btn-back" onclick="history.back()">‹</button>
            <h1>Crea account</h1>
        </div>

        <div class="error-box" id="error-box"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="tuaemail@esempio.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Nickname</label>
            <input type="text" id="nickname" placeholder="Il tuo nome" maxlength="30" autocomplete="nickname">
            <div class="field-hint">Visibile nella co-gestione</div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Min. 8 caratteri" autocomplete="new-password" oninput="checkStrength()">
                <button class="toggle-pw" type="button" onclick="togglePw('password')">👁</button>
            </div>
            <div class="pw-strength">
                <div class="pw-bar" id="bar1"></div>
                <div class="pw-bar" id="bar2"></div>
                <div class="pw-bar" id="bar3"></div>
            </div>
        </div>
        <div class="form-group">
            <label>Conferma Password</label>
            <div class="input-wrap">
                <input type="password" id="password2" placeholder="Ripeti la password" autocomplete="new-password">
                <button class="toggle-pw" type="button" onclick="togglePw('password2')">👁</button>
            </div>
        </div>

        <button class="btn-primary" id="btn-reg" onclick="doRegister()">Crea account</button>

        <div class="link-row">Hai già un account? <a href="login.html">Accedi</a></div>
    </div>

    <!-- SUCCESSO -->
    <div class="success-screen" id="success-screen">
        <span class="big-emoji">📧</span>
        <h2>Controlla la tua email!</h2>
        <p>Abbiamo inviato un link di verifica a:</p>
        <div class="email-chip" id="sent-email"></div>
        <p>Clicca il link nell'email per attivare il tuo account e accedere all'app.</p>
        <a href="login.html" style="display:block;background:#2a2a2a;color:#f0f0f0;border-radius:14px;padding:14px;font-size:15px;font-weight:700;text-decoration:none;margin-top:8px;">Vai al Login</a>
        <div style="font-size:12px;color:#555;margin-top:12px;">Non hai ricevuto l'email? Controlla anche la cartella spam.</div>
    </div>

</div>

<script src="auth.js"></script>
<script>
    function showError(msg) {
        var e = document.getElementById('error-box');
        e.textContent = msg; e.style.display = 'block';
    }
    function setLoading(on) {
        var btn = document.getElementById('btn-reg');
        btn.disabled = on;
        btn.innerHTML = on ? '<span class="spinner"></span>' : 'Crea account';
    }
    function togglePw(id) {
        var inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
    }
    function checkStrength() {
        var pw = document.getElementById('password').value;
        var s = 0;
        if (pw.length >= 8) s++;
        if (/[A-Z]/.test(pw) || /[0-9]/.test(pw)) s++;
        if (/[^A-Za-z0-9]/.test(pw) || pw.length >= 12) s++;
        var cls = ['', 'weak', 'medium', 'strong'];
        for (var i = 1; i <= 3; i++) {
            document.getElementById('bar' + i).className = 'pw-bar' + (i <= s ? ' ' + cls[s] : '');
        }
    }

    function doRegister() {
        var email = document.getElementById('email').value.trim();
        var nick  = document.getElementById('nickname').value.trim();
        var pw    = document.getElementById('password').value;
        var pw2   = document.getElementById('password2').value;

        if (!email || !nick || !pw) { showError('Compila tutti i campi'); return; }
        if (pw.length < 8)          { showError('La password deve avere almeno 8 caratteri'); return; }
        if (pw !== pw2)             { showError('Le password non coincidono'); return; }

        setLoading(true);
        authSignUp(email, pw, nick, function(data, err) {
            setLoading(false);
            if (err) { showError(err); return; }
            // Mostra schermata successo
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('sent-email').textContent = email;
            document.getElementById('success-screen').style.display = 'block';
        });
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doRegister();
    });

    if (authIsLoggedIn()) window.location.href = 'index.html';
</script>
</body>
</html>
