<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Installa Geco Leopardino</title>
    <meta name="theme-color" content="#111">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:-apple-system,'Segoe UI',sans-serif;
            background:#111; color:#f0f0f0;
            min-height:100vh; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:32px 24px; text-align:center; gap:0;
        }

        .glow {
            position:fixed; top:-200px; left:50%; transform:translateX(-50%);
            width:500px; height:500px; border-radius:50%;
            background:radial-gradient(circle,rgba(255,153,64,.15),transparent 70%);
            pointer-events:none;
        }

        .icon {
            width:100px; height:100px; border-radius:24px;
            background:linear-gradient(135deg,#1e1a12,#2a2010);
            border:1px solid rgba(255,153,64,.3);
            display:flex; align-items:center; justify-content:center;
            font-size:56px; margin-bottom:24px;
            box-shadow:0 8px 40px rgba(255,153,64,.2);
            animation:pop .7s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes pop {
            from { transform:scale(.4); opacity:0; }
            to   { transform:scale(1);  opacity:1; }
        }

        h1 {
            font-size:28px; font-weight:800; margin-bottom:10px;
            animation:up .5s ease .2s both;
        }
        .sub {
            font-size:15px; color:#666; margin-bottom:36px; line-height:1.5;
            animation:up .5s ease .3s both;
        }
        @keyframes up {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ANDROID — bottone diretto */
        .btn-install {
            background:linear-gradient(135deg,#ff9940,#ff6b00);
            color:#111; border:none; border-radius:16px;
            padding:18px 40px; font-size:17px; font-weight:800;
            cursor:pointer; width:100%; max-width:320px;
            box-shadow:0 4px 24px rgba(255,153,64,.3);
            display:none; margin-bottom:12px;
            animation:up .5s ease .4s both;
        }
        .btn-install.show { display:block; }

        /* OPEN — apri direttamente l'app */
        .btn-open {
            background:linear-gradient(135deg,#ff9940,#ff6b00);
            color:#111; border:none; border-radius:16px;
            padding:18px 40px; font-size:17px; font-weight:800;
            cursor:pointer; width:100%; max-width:320px;
            box-shadow:0 4px 24px rgba(255,153,64,.3);
            text-decoration:none; display:block;
            animation:up .5s ease .4s both;
        }

        /* iOS — steps */
        .ios-steps {
            width:100%; max-width:340px; display:none;
            flex-direction:column; gap:10px; margin-bottom:16px;
            animation:up .5s ease .4s both;
        }
        .ios-steps.show { display:flex; }

        .step {
            background:#1a1a1a; border:1px solid #2a2a2a;
            border-radius:14px; padding:14px 18px;
            display:flex; align-items:center; gap:14px; text-align:left;
        }
        .step-n {
            width:28px; height:28px; border-radius:50%; flex-shrink:0;
            background:linear-gradient(135deg,#ff9940,#ff6b00);
            color:#111; font-size:13px; font-weight:800;
            display:flex; align-items:center; justify-content:center;
        }
        .step-text { font-size:14px; color:#ccc; line-height:1.4; }
        .step-text b { color:#fff; }

        .note { font-size:12px; color:#444; margin-top:16px; }
    </style>
</head>
<body>

<div class="glow"></div>

<div class="icon">🦎</div>
<h1>Geco Leopardino</h1>
<p class="sub">L'app per la cura del tuo geco.<br>Gratis, nessun account.</p>

<!-- Android: bottone diretto -->
<button class="btn-install" id="btn-install" onclick="installa()">📲 Installa l'app</button>

<!-- iOS: istruzioni -->
<div class="ios-steps" id="ios-steps">
    <div class="step">
        <div class="step-n">1</div>
        <div class="step-text">Tocca <b>□↑</b> in basso (il bottone Condividi di Safari)</div>
    </div>
    <div class="step">
        <div class="step-n">2</div>
        <div class="step-text">Scorri e tocca <b>Aggiungi a schermata Home</b></div>
    </div>
    <div class="step">
        <div class="step-n">3</div>
        <div class="step-text">Tocca <b>Aggiungi</b> — l'icona appare sul telefono ✓</div>
    </div>
</div>

<!-- Già installata o desktop -->
<a href="index.html" class="btn-open" id="btn-open" style="display:none;">🦎 Apri l'app</a>

<p class="note" id="bottom-note"></p>

<script>
    var deferredPrompt = null;
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isAndroid = /android/i.test(navigator.userAgent);
    var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

    if (isStandalone) {
        // Già installata — vai all'app
        document.getElementById('btn-open').style.display = 'block';
        document.getElementById('bottom-note').textContent = 'App già installata!';
    } else if (isIOS) {
        // iPhone/iPad — mostra istruzioni manuali
        document.getElementById('ios-steps').classList.add('show');
        document.getElementById('bottom-note').textContent = 'Apri questo link con Safari per installare';
    } else {
        // Android o desktop — aspetta il prompt
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btn-install').classList.add('show');
        });

        // Se il prompt non arriva (già installata o non supportato)
        setTimeout(function() {
            if (!deferredPrompt && !document.getElementById('btn-install').classList.contains('show')) {
                document.getElementById('btn-open').style.display = 'block';
            }
        }, 800);
    }

    function installa() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(r) {
            if (r.outcome === 'accepted') {
                document.getElementById('btn-install').textContent = '✅ Installata!';
                document.getElementById('btn-install').disabled = true;
            }
            deferredPrompt = null;
        });
    }
</script>
</body>
</html>
