<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Calendario - Geco</title>
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    <script>(function(){try{var c=localStorage.getItem('activeColor');if(!c){var gs=JSON.parse(localStorage.getItem('geckos')||'[]'),id=localStorage.getItem('activeGeckoId')||'',gk=gs.find(function(g){return g.id===id;})||gs[0]||null;c=gk&&gk.colore?gk.colore:null;}if(c)document.documentElement.style.setProperty('--accent',c);}catch(e){}})();</script>
    <style>
        :root { --accent: #ff9940; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family:-apple-system,'Segoe UI',sans-serif;
            background:#111; color:#f0f0f0; min-height:100vh;
            padding-top:env(safe-area-inset-top);
            padding-bottom:calc(70px + env(safe-area-inset-bottom));
        }

        header {
            background:#1a1a1a; padding:16px 20px 14px;
            border-bottom:1px solid #2a2a2a;
            display:flex; align-items:center; gap:12px;
            position:sticky; top:0; z-index:100;
        }
        .h-emoji { font-size:24px; }
        .h-text h1 { font-size:17px; font-weight:700; }
        .h-text p  { font-size:11px; color:#888; }

        .page { padding:12px 14px; max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:10px; }

        /* ── METEO ── */
        .meteo-card {
            background:#1a1a1a; border:1px solid #2a2a2a;
            border-radius:14px; padding:14px 16px;
            display:flex; align-items:center; gap:12px;
        }
        .meteo-icon { font-size:36px; flex-shrink:0; }
        .meteo-temp { font-size:28px; font-weight:800; color:#f0f0f0; line-height:1; }
        .meteo-desc { font-size:12px; color:#888; margin-top:3px; }
        .meteo-loc  {
            margin-left:auto; text-align:right; flex-shrink:0;
            font-size:11px; font-weight:700; color:var(--accent);
            line-height:1.5;
        }
        .meteo-loading { font-size:13px; color:#555; }

        /* ── NAV MESE ── */
        .month-nav {
            display:flex; align-items:center; gap:8px;
        }
        .nav-btn {
            background:#2a2a2a; border:1px solid #333; color:#f0f0f0;
            border-radius:10px; width:40px; height:40px; font-size:20px;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; flex-shrink:0; transition:background .15s;
        }
        .nav-btn:active { background:var(--accent); color:#111; }
        .month-name { flex:1; text-align:center; font-size:19px; font-weight:800; color:var(--accent); }
        .btn-oggi {
            background:rgba(255,153,64,.12); border:1px solid rgba(255,153,64,.35);
            color:var(--accent); border-radius:10px; padding:0 12px; height:40px;
            font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap;
        }
        .btn-oggi:active { background:var(--accent); color:#111; }

        /* ── PROGRESS ── */
        .prog-box {
            background:#1a1a1a; border:1px solid #2a2a2a;
            border-radius:12px; padding:10px 14px;
            display:flex; align-items:center; gap:12px;
        }
        .prog-circle { position:relative; flex-shrink:0; }
        .prog-circle svg { display:block; }
        .prog-arc { transition:stroke-dashoffset .7s ease; }
        .prog-pct {
            position:absolute; inset:0; display:flex;
            align-items:center; justify-content:center;
            font-size:12px; font-weight:800; color:var(--accent);
        }
        .prog-info { flex:1; }
        .prog-label { font-size:11px; color:#666; }
        .prog-detail { font-size:13px; font-weight:700; color:#f0f0f0; margin-top:2px; }

        /* ── GRIGLIA CALENDARIO ── */
        .cal-wrap { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:14px; padding:12px; }

        .cal-week-headers {
            display:grid; grid-template-columns:repeat(7,1fr);
            gap:3px; margin-bottom:5px;
        }
        .cal-wh {
            text-align:center; font-size:11px; font-weight:700;
            color:#fff; padding:4px 0;
        }
        .cal-wh.we { color:#fff; }

        .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }

        .cal-cell {
            aspect-ratio:1; border-radius:8px;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            gap:2px; position:relative;
            background:#161616; border:1px solid transparent;
            transition:transform .1s;
        }
        .cal-cell:active { transform:scale(.9); }
        .cal-cell.vuoto  { background:transparent; border:none; pointer-events:none; }
        .cal-cell.digiuno { background:#161616; border-color:transparent; opacity:.4; pointer-events:none; }
        .cal-cell.fatto   { background:rgba(34,197,94,.14); border-color:rgba(34,197,94,.3); cursor:pointer; }
        .cal-cell.saltato { background:rgba(239,68,68,.1); border-color:rgba(239,68,68,.25); cursor:pointer; }
        .cal-cell.futuro  { background:#161616; border-color:transparent; pointer-events:none; }
        .cal-cell.pasto   { background:#1e1a14; border-color:#2a2218; cursor:pointer; }
        .cal-cell.oggi    { outline:2px solid var(--accent); outline-offset:-1px; }

        .cal-num  { font-size:13px; font-weight:700; color:#888; line-height:1; }
        .cal-cell.fatto   .cal-num { color:#22c55e; }
        .cal-cell.saltato .cal-num { color:#ef4444; }
        .cal-cell.oggi    .cal-num { color:var(--accent); font-size:14px; }
        .cal-cell.pasto   .cal-num { color:#aaa; }

        .cal-dot { font-size:9px; line-height:1; }

        /* ── LEGENDA ── */
        .legenda {
            display:flex; gap:12px; flex-wrap:wrap;
            justify-content:center; padding:4px 0;
        }
        .leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#fff; }
        .leg-dot  { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0;
            background:#1a1a1a; border-top:1px solid #2a2a2a;
            display:flex; padding-bottom:env(safe-area-inset-bottom); z-index:999;
        }
        .bn-item {
            flex:1; display:flex; flex-direction:column; align-items:center;
            justify-content:center; padding:8px 0; text-decoration:none;
            color:#555; transition:color .15s; gap:2px;
        }
        .bn-item.active { color:var(--accent); }
        .bn-icon  { font-size:20px; line-height:1; }
        .bn-label { font-size:10px; font-weight:600; }
    </style>
</head>
<body>

<header>
    <div class="h-emoji">📅</div>
    <div class="h-text">
        <h1>Calendario</h1>
        <p id="h-sub">Piano alimentare mensile</p>
    </div>
</header>

<div class="page">

    <!-- METEO -->
    <div class="meteo-card" id="meteo-card">
        <div class="meteo-icon" id="meteo-icon">🌤️</div>
        <div>
            <div class="meteo-loading" id="meteo-temp">Caricamento meteo...</div>
            <div class="meteo-desc" id="meteo-desc"></div>
        </div>
        <div class="meteo-loc">📍 Giarre<br>Catania</div>
    </div>

    <!-- NAV MESE -->
    <div class="month-nav">
        <button class="nav-btn" onclick="prevM()">‹</button>
        <div class="month-name" id="month-name">—</div>
        <button class="nav-btn" onclick="nextM()">›</button>
        <button class="btn-oggi" onclick="goOggi()">📍 Oggi</button>
    </div>

    <!-- PROGRESS -->
    <div class="prog-box">
        <div class="prog-circle">
            <svg width="56" height="56" viewBox="0 0 56 56">
                <circle cx="28" cy="28" r="22" fill="none" stroke="#2a2a2a" stroke-width="5"/>
                <circle id="prog-arc" class="prog-arc" cx="28" cy="28" r="22" fill="none"
                    stroke="var(--accent)" stroke-width="5" stroke-linecap="round"
                    stroke-dasharray="138.2" stroke-dashoffset="138.2"
                    transform="rotate(-90 28 28)"/>
            </svg>
            <div class="prog-pct" id="prog-pct">0%</div>
        </div>
        <div class="prog-info">
            <div class="prog-label" id="prog-label">Pasti completati</div>
            <div class="prog-detail" id="prog-detail">— / — questo mese</div>
        </div>
    </div>

    <!-- GRIGLIA -->
    <div class="cal-wrap">
        <div class="cal-week-headers">
            <div class="cal-wh">Lu</div>
            <div class="cal-wh">Ma</div>
            <div class="cal-wh">Me</div>
            <div class="cal-wh">Gi</div>
            <div class="cal-wh">Ve</div>
            <div class="cal-wh we">Sa</div>
            <div class="cal-wh we">Do</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- LEGENDA -->
    <div class="legenda">
        <div class="leg-item"><div class="leg-dot" style="background:rgba(34,197,94,.5)"></div>Mangiato</div>
        <div class="leg-item"><div class="leg-dot" style="background:rgba(239,68,68,.4)"></div>Saltato</div>
        <div class="leg-item"><div class="leg-dot" style="background:#1e1a14;border:1px solid #333"></div>Da fare</div>
        <div class="leg-item"><div class="leg-dot" style="background:#161616;opacity:.4"></div>Digiuno</div>
        <div class="leg-item"><div class="leg-dot" style="background:#22c55e;width:8px;height:8px;border-radius:50%"></div>Calcio Puro</div>
        <div class="leg-item"><div class="leg-dot" style="background:#facc15;width:8px;height:8px;border-radius:50%"></div>Calcio + D3</div>
    </div>

</div>

<nav class="bottom-nav">
    <a href="index.html"      class="bn-item"><span class="bn-icon">🏠</span><span class="bn-label">Home</span></a>
    <a href="calendario.html" class="bn-item active"><span class="bn-icon">📅</span><span class="bn-label">Calendario</span></a>
    <a href="profili.html"    class="bn-item"><span class="bn-icon">🦎</span><span class="bn-label">Gechi</span></a>
    <a href="note.html"       class="bn-item"><span class="bn-icon">📝</span><span class="bn-label">Note</span></a>
    <a href="impostazioni.html" class="bn-item"><span class="bn-icon">⚙️</span><span class="bn-label">Impostazioni</span></a>
</nav>

<script>
    var MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    var GS   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

    // Ciclo 7 giorni — parte dal 30 Maggio 2026 (Calcio Puro)
    var CYCLE = [
        'INSETTI + CALCIO PURO','DIGIUNO',
        'INSETTI + CALCIO PURO','DIGIUNO',
        'INSETTI + CALCIO PURO','DIGIUNO',
        'INSETTI + CALCIO + D3','DIGIUNO'
    ];
    var REF = new Date(2026, 4, 30); // 30 maggio 2026 = posizione 0

    function getAlim(y, m, d) {
        var diff = Math.round((new Date(y, m, d) - REF) / 86400000);
        return CYCLE[((diff % 8) + 8) % 8];
    }

    var METEO_ICONS = {
        0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
        45:'🌫️', 48:'🌫️',
        51:'🌦️', 53:'🌦️', 55:'🌧️',
        61:'🌧️', 63:'🌧️', 65:'🌧️',
        71:'🌨️', 73:'🌨️', 75:'❄️',
        80:'🌦️', 81:'🌧️', 82:'⛈️',
        95:'⛈️', 96:'⛈️', 99:'⛈️'
    };
    var METEO_DESC = {
        0:'Cielo sereno', 1:'Poco nuvoloso', 2:'Parzialmente nuvoloso', 3:'Nuvoloso',
        45:'Nebbia', 48:'Nebbia',
        51:'Pioggerella', 53:'Pioggerella', 55:'Pioggia leggera',
        61:'Pioggia', 63:'Pioggia moderata', 65:'Pioggia forte',
        71:'Neve leggera', 73:'Neve', 75:'Neve forte',
        80:'Rovesci', 81:'Rovesci', 82:'Rovesci forti',
        95:'Temporale', 96:'Temporale', 99:'Temporale con grandine'
    };

    var oggi = new Date();
    var anno = oggi.getFullYear();
    var mese = oggi.getMonth();

    function getGecko() {
        try {
            var gs = JSON.parse(localStorage.getItem('geckos')||'[]');
            var id = localStorage.getItem('activeGeckoId')||'';
            return gs.find(function(g){return g.id===id;})||gs[0]||null;
        } catch(e){ return null; }
    }

    function getDays(m, y) { return new Date(y, m+1, 0).getDate(); }
    function feedKey(gid, mNome, g) { return 'feed_'+gid+'_'+mNome+'_'+g; }

    // ── METEO ──
    function caricaMeteo() {
        fetch('https://api.open-meteo.com/v1/forecast?latitude=37.73&longitude=15.18&current=temperature_2m,weathercode&timezone=Europe/Rome')
            .then(function(r){ return r.json(); })
            .then(function(data) {
                var temp = Math.round(data.current.temperature_2m);
                var code = data.current.weathercode;
                var icon = METEO_ICONS[code] || '🌤️';
                var desc = METEO_DESC[code]  || 'Variabile';
                document.getElementById('meteo-icon').textContent = icon;
                document.getElementById('meteo-temp').innerHTML =
                    '<span class="meteo-temp">' + temp + '°C</span>';
                document.getElementById('meteo-desc').textContent = desc;
            })
            .catch(function() {
                document.getElementById('meteo-temp').textContent = 'Meteo non disponibile';
            });
    }

    // ── PROGRESS ──
    function aggiornaProgress() {
        var gecko  = getGecko();
        var nome   = MESI[mese];
        var giorni = getDays(mese, anno);
        var comp = 0, tot = 0;
        for (var i = 1; i <= giorni; i++) {
            if (getAlim(anno, mese, i) !== 'DIGIUNO') {
                tot++;
                if (gecko && localStorage.getItem(feedKey(gecko.id, nome, i)) === 'true') comp++;
            }
        }
        var pct  = tot > 0 ? Math.round(comp/tot*100) : 0;
        var CIRC = 138.2;
        document.getElementById('prog-pct').textContent = pct + '%';
        document.getElementById('prog-detail').textContent = comp + ' / ' + tot + ' pasti ' + nome;
        if (gecko) document.getElementById('prog-label').textContent = gecko.nome + ' — ' + MESI[mese];
        setTimeout(function() {
            var arc = document.getElementById('prog-arc');
            if (arc) arc.setAttribute('stroke-dashoffset', String(CIRC * (1 - pct/100)));
        }, 80);
    }

    // ── GRIGLIA ──
    function buildGrid() {
        var gecko  = getGecko();
        var nome   = MESI[mese];
        var giorni = getDays(mese, anno);
        var isCurMese  = mese === oggi.getMonth() && anno === oggi.getFullYear();
        var isPastMese = anno < oggi.getFullYear() || (anno === oggi.getFullYear() && mese < oggi.getMonth());
        var gg = oggi.getDate();

        // Primo giorno della settimana (0=Dom → offset)
        var primoGiorno = new Date(anno, mese, 1).getDay();
        var offset = primoGiorno === 0 ? 6 : primoGiorno - 1; // Lunedì = 0

        document.getElementById('month-name').textContent = nome + ' ' + anno;
        document.getElementById('h-sub').textContent = nome + ' ' + anno;

        var html = '';

        // Celle vuote prima del primo giorno
        for (var v = 0; v < offset; v++) {
            html += '<div class="cal-cell vuoto"></div>';
        }

        for (var i = 1; i <= giorni; i++) {
            var alim   = getAlim(anno, mese, i);
            var isDig  = alim === 'DIGIUNO';
            var isToday  = isCurMese && i === gg;
            var isPastDay = isPastMese || (isCurMese && i < gg);
            var isFuture = !isPastDay && !isToday;
            var fatto  = !isDig && gecko && localStorage.getItem(feedKey(gecko.id, nome, i)) === 'true';

            var cls = 'cal-cell';
            if (isToday) cls += ' oggi';

            var isD3  = alim.includes('D3');
            var suppDot = isD3
                ? '<span style="width:7px;height:7px;border-radius:50%;background:#facc15;display:inline-block;flex-shrink:0;" title="Calcio + D3"></span>'
                : '<span style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;flex-shrink:0;" title="Calcio Puro"></span>';

            var dot = '';
            if (isDig) {
                cls += ' digiuno';
                dot = '';
            } else if (isPastDay) {
                cls += fatto ? ' fatto' : ' saltato';
                dot = (fatto
                    ? '<span class="cal-dot">✓</span>'
                    : '<span class="cal-dot" style="color:#ef444488">✕</span>')
                    + suppDot;
            } else if (isFuture) {
                cls += ' pasto';
                dot = suppDot;
            } else {
                cls += ' pasto';
                dot = (fatto ? '<span class="cal-dot">✓</span>' : '') + suppDot;
            }

            var onclick = (!isDig && (isPastDay || isToday || isFuture))
                ? ' onclick="toggleGiorno(' + i + ')"' : '';

            html += '<div class="' + cls + '"' + onclick + ' id="dc-' + i + '">' +
                '<span class="cal-num">' + i + '</span>' +
                dot +
            '</div>';
        }

        document.getElementById('cal-grid').innerHTML = html;
    }

    function toggleGiorno(g) {
        var gecko = getGecko();
        if (!gecko) return;
        var alim = getAlim(anno, mese, g);
        if (alim === 'DIGIUNO') return;
        var key = feedKey(gecko.id, MESI[mese], g);
        if (localStorage.getItem(key) === 'true') localStorage.removeItem(key);
        else localStorage.setItem(key, 'true');
        buildGrid();
        aggiornaProgress();
    }

    function prevM() {
        mese--;
        if (mese < 0) { mese = 11; anno--; }
        buildGrid(); aggiornaProgress();
    }
    function nextM() {
        mese++;
        if (mese > 11) { mese = 0; anno++; }
        buildGrid(); aggiornaProgress();
    }
    function goOggi() {
        mese = oggi.getMonth(); anno = oggi.getFullYear();
        buildGrid(); aggiornaProgress();
        setTimeout(function() {
            var el = document.getElementById('dc-' + oggi.getDate());
            if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
        }, 100);
    }

    caricaMeteo();
    buildGrid();
    aggiornaProgress();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
</script>
<script src="transitions.js"></script>
</body>
</html>
