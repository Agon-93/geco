<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Scheda Geco</title>
    <meta name="theme-color" content="#1a7a65">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: Arial, 'Helvetica Neue', sans-serif;
            background: #f2f2f2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 16px;
        }

        /* ── CARD ── */
        .card {
            background: #e5f3ee;
            border: 2px solid #2a9070;
            border-radius: 18px;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 6px 24px rgba(0,0,0,.15);
        }

        .card-header {
            background: #1a7a65;
            color: #fff;
            text-align: center;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .card-body {
            padding: 22px 24px 10px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .field {
            flex: 1;
            min-width: 120px;
        }

        .field.wide { flex: 2; min-width: 160px; }

        .field-label {
            font-size: 12px;
            font-weight: 700;
            color: #1a7a65;
            letter-spacing: .04em;
            margin-bottom: 5px;
        }

        .field-value {
            font-size: 14px;
            font-weight: 600;
            color: #111;
            border-bottom: 1.5px solid #2a9070;
            padding-bottom: 5px;
            min-height: 24px;
            word-break: break-word;
            line-height: 1.4;
        }

        .field-value.empty { color: #aaa; font-weight: 400; }

        .card-spacer { height: 16px; }

        /* ── BOTTONI ── */
        .card-btns {
            padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            border-top: 1px solid #c5ddd7;
        }

        .btn {
            flex: 1; padding: 13px; border-radius: 12px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            border: none; text-align: center; text-decoration: none;
            display: block;
        }
        .btn:active { opacity: .8; }
        .btn-print { background: #1a7a65; color: #fff; }
        .btn-app   { background: #c8e8df; color: #1a7a65; }

        /* ── NOT FOUND ── */
        .not-found {
            text-align: center; padding: 40px 24px;
        }
        .not-found .icon { font-size: 56px; margin-bottom: 14px; display: block; }
        .not-found h2 { font-size: 19px; font-weight: 700; color: #111; margin-bottom: 8px; }
        .not-found p  { font-size: 13px; color: #888; margin-bottom: 20px; }
        .not-found a  { color: #1a7a65; font-weight: 700; text-decoration: none; font-size: 14px; }

        /* ── STAMPA ── */
        @media print {
            body {
                background: #fff;
                padding: 15mm;
                justify-content: flex-start;
            }
            .card {
                box-shadow: none;
                max-width: 160mm;
                border: 2px solid #2a9070;
            }
            .card-btns { display: none; }
            .field-value { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <div class="card-header">SCHEDA IDENTIFICAZIONE</div>
    <div class="card-body" id="card-body">
        <div style="text-align:center;padding:20px 0;color:#888;font-size:14px;">Caricamento...</div>
    </div>
</div>

<script>
    var MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

    function getGeckos() { try { return JSON.parse(localStorage.getItem('geckos')||'[]'); } catch(e){ return []; } }

    function formatData(nascita) {
        if (!nascita) return null;
        var p = nascita.split('-');
        if (p.length < 3) return null;
        return parseInt(p[2]) + ' ' + MESI[parseInt(p[1])-1] + ' ' + p[0];
    }

    function calcEta(nascita) {
        if (!nascita) return null;
        var p = nascita.split('-');
        var dn = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        var mesi = Math.floor((new Date() - dn) / (86400000 * 30.5));
        if (mesi < 1)  return '< 1 mese';
        if (mesi < 24) return mesi + ' mes' + (mesi===1?'e':'i');
        var anni = Math.floor(mesi/12), mr = mesi%12;
        return anni + ' ann' + (anni===1?'o':'i') + (mr>0?' e '+mr+' mesi':'');
    }

    function val(v) {
        if (!v) return '<div class="field-value empty">—</div>';
        return '<div class="field-value">' + v + '</div>';
    }

    function render(gecko) {
        var sessoLabel = gecko.sesso === 'M' ? '♂ Maschio' : gecko.sesso === 'F' ? '♀ Femmina' : null;
        var nascitaStr = formatData(gecko.nascita);
        var eta        = calcEta(gecko.nascita);
        var nascitaFull = nascitaStr ? (nascitaStr + (eta ? '<br><span style="font-size:12px;color:#555;font-weight:400;">' + eta + '</span>' : '')) : null;

        document.getElementById('card-body').innerHTML =
            '<div class="row">' +
                '<div class="field wide">' +
                    '<div class="field-label">Nome</div>' +
                    val(gecko.nome) +
                '</div>' +
                '<div class="field wide">' +
                    '<div class="field-label">Data di Nascita</div>' +
                    val(nascitaFull) +
                '</div>' +
            '</div>' +
            '<div class="row">' +
                '<div class="field">' +
                    '<div class="field-label">Sesso</div>' +
                    val(sessoLabel) +
                '</div>' +
                '<div class="field wide">' +
                    '<div class="field-label">Morfologia</div>' +
                    val(gecko.morfo) +
                '</div>' +
            '</div>' +
            '<div class="field">' +
                '<div class="field-label">Note</div>' +
                val(gecko.noteRapide) +
            '</div>' +
            '<div class="card-spacer"></div>';

        document.getElementById('card').insertAdjacentHTML('beforeend',
            '<div class="card-btns">' +
                '<button class="btn btn-print" onclick="window.print()">🖨️ Stampa</button>' +
                '<a href="profili.html" class="btn btn-app">🦎 Apri app</a>' +
            '</div>'
        );
    }

    function renderNotFound() {
        document.getElementById('card-body').innerHTML =
            '<div class="not-found">' +
                '<span class="icon">🦎</span>' +
                '<h2>Geco non trovato</h2>' +
                '<p>Questo QR appartiene a un altro dispositivo</p>' +
                '<a href="profili.html">Apri l\'app →</a>' +
            '</div>';
    }

    var params = new URLSearchParams(window.location.search);
    var id     = params.get('id');
    var d      = params.get('d');
    var gecko  = null;

    if (id) gecko = getGeckos().find(function(g){ return g.id === id; });
    if (!gecko && d) {
        try { gecko = JSON.parse(decodeURIComponent(escape(atob(d)))); } catch(e) {}
    }

    if (gecko) render(gecko);
    else renderNotFound();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
</script>
<script src="transitions.js"></script>
</body>
</html>
