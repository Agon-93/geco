<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Scheda Geco</title>
    <meta name="theme-color" content="#1a7a65">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: Arial, 'Helvetica Neue', sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 14px;
        }

        .card {
            background: #e5f3ee;
            border: 2px solid #2a9070;
            border-radius: 16px;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,.12);
        }

        .card-header {
            background: #1a7a65;
            color: #fff;
            text-align: center;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .card-body {
            padding: 20px 24px 8px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field { display: flex; flex-direction: column; gap: 4px; }

        .field-label {
            font-size: 11px;
            font-weight: 700;
            color: #1a7a65;
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .field-value {
            font-size: 15px;
            font-weight: 600;
            color: #111;
            border-bottom: 1.5px solid #2a9070;
            padding-bottom: 6px;
            min-height: 26px;
            word-break: break-word;
            line-height: 1.4;
        }

        .field-value.vuoto { color: #bbb; font-weight: 400; font-style: italic; }

        .card-spacer { height: 12px; }

        .card-footer {
            padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            border-top: 1.5px solid #c5ddd7;
        }

        .btn {
            flex: 1; padding: 13px; border-radius: 12px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            border: none; text-align: center; text-decoration: none;
            display: block; transition: opacity .15s;
        }
        .btn:active { opacity: .75; }
        .btn-pdf  { background: #1a7a65; color: #fff; }
        .btn-img  { background: #c8e8df; color: #1a7a65; }

        /* NOT FOUND */
        .not-found { text-align:center; padding:40px 24px; }
        .not-found .icon { font-size:56px; margin-bottom:14px; display:block; }
        .not-found h2 { font-size:19px; font-weight:700; color:#111; margin-bottom:8px; }
        .not-found p  { font-size:13px; color:#888; margin-bottom:20px; }
        .not-found a  { color:#1a7a65; font-weight:700; text-decoration:none; }

        /* STAMPA */
        @media print {
            @page { margin: 12mm; size: A4; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background:#fff !important; padding:0 !important; display:block !important; }
            .card { box-shadow:none !important; max-width:100% !important; width:100% !important; border-radius:10px !important; }
            .card-header { font-size:19px !important; padding:18px !important; }
            .card-body { padding:24px 28px 12px !important; gap:18px !important; }
            .field-label { font-size:12px !important; }
            .field-value  { font-size:16px !important; padding-bottom:8px !important; }
            .card-footer  { display:none !important; }
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <div class="card-header">SCHEDA IDENTIFICAZIONE</div>
    <div id="card-body" class="card-body">
        <div style="text-align:center;padding:20px 0;color:#888;">Caricamento...</div>
    </div>
</div>

<script>
    var MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

    function getGeckos() { try { return JSON.parse(localStorage.getItem('geckos')||'[]'); } catch(e){ return []; } }

    function formatData(nascita) {
        if (!nascita) return null;
        var p = nascita.split('-');
        if (p.length < 3) return null;
        return parseInt(p[2]) + ' ' + MESI[parseInt(p[1])-1] + ' ' + p[0];
    }

    function calcEta(nascita) {
        if (!nascita) return null;
        var p = nascita.split('-');
        var dn = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
        var mesi = Math.floor((new Date() - dn) / (86400000 * 30.5));
        if (mesi < 1)  return '< 1 mese';
        if (mesi < 24) return mesi + ' mes' + (mesi===1?'e':'i');
        var anni = Math.floor(mesi/12), mr = mesi%12;
        return anni + ' ann' + (anni===1?'o':'i') + (mr>0?' e '+mr+' mesi':'');
    }

    function field(label, value) {
        var cls = value ? 'field-value' : 'field-value vuoto';
        var val = value || '—';
        return '<div class="field">' +
            '<div class="field-label">' + label + '</div>' +
            '<div class="' + cls + '">' + val + '</div>' +
        '</div>';
    }

    var gecko = null;

    function render(g) {
        gecko = g;
        var sessoLabel = g.sesso === 'M' ? '♂ Maschio' : g.sesso === 'F' ? '♀ Femmina' : null;
        var nascitaStr = formatData(g.nascita);
        var eta        = calcEta(g.nascita);
        var nascitaFull = nascitaStr ? nascitaStr + (eta ? ' (' + eta + ')' : '') : null;

        document.getElementById('card-body').innerHTML =
            field('Nome', g.nome) +
            field('Data di Nascita', nascitaFull) +
            field('Sesso', sessoLabel) +
            field('Morfologia', g.morfo) +
            field('Note', g.noteRapide) +
            '<div class="card-spacer"></div>';

        document.getElementById('card').insertAdjacentHTML('beforeend',
            '<div class="card-footer" id="card-footer">' +
                '<button class="btn btn-pdf" id="btn-pdf" onclick="salvaPDF()">📄 Salva PDF</button>' +
                '<button class="btn btn-img" id="btn-img" onclick="salvaImmagine()">📸 Salva Immagine</button>' +
            '</div>'
        );
    }

    function renderNotFound() {
        document.getElementById('card-body').innerHTML =
            '<div class="not-found">' +
                '<span class="icon">🦎</span>' +
                '<h2>Geco non trovato</h2>' +
                '<p>Apri l\'app e accedi al profilo del geco</p>' +
                '<a href="profili.html">Apri l\'app →</a>' +
            '</div>';
    }

    // ── CATTURA ──
    function cattura(callback) {
        var footer = document.getElementById('card-footer');
        if (footer) footer.style.display = 'none';
        function esegui() {
            html2canvas(document.getElementById('card'), {
                scale: 3, useCORS: true, allowTaint: true,
                backgroundColor: '#e5f3ee', logging: false
            }).then(function(canvas) {
                if (footer) footer.style.display = '';
                callback(canvas);
            }).catch(function() {
                if (footer) footer.style.display = '';
                alert('Errore nella creazione del file');
            });
        }
        if (!window.html2canvas) {
            var s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
            s.onload = esegui;
            s.onerror = function() { if (footer) footer.style.display=''; alert('Connessione necessaria la prima volta'); };
            document.head.appendChild(s);
        } else { esegui(); }
    }

    // ── SALVA PDF ──
    function salvaPDF() {
        var btn = document.getElementById('btn-pdf');
        btn.textContent = '⏳ Creazione...'; btn.disabled = true;
        cattura(function(canvas) {
            function faiPDF() {
                var nome = (gecko && gecko.nome ? gecko.nome : 'geco').toLowerCase().replace(/\s+/g,'-');
                var pdf  = new window.jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
                var pw   = pdf.internal.pageSize.getWidth();
                var iw   = pw - 20;
                var ih   = (canvas.height * iw) / canvas.width;
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, iw, ih);
                pdf.save('scheda-' + nome + '.pdf');
                btn.textContent = '📄 Salva PDF'; btn.disabled = false;
            }
            if (!window.jspdf) {
                var s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
                s.onload = faiPDF;
                document.head.appendChild(s);
            } else { faiPDF(); }
        });
    }

    // ── SALVA IMMAGINE ──
    function salvaImmagine() {
        var btn = document.getElementById('btn-img');
        btn.textContent = '⏳ Creazione...'; btn.disabled = true;
        cattura(function(canvas) {
            var nome = (gecko && gecko.nome ? gecko.nome : 'geco').toLowerCase().replace(/\s+/g,'-');
            var filename = 'scheda-' + nome + '.png';
            canvas.toBlob(function(blob) {
                var file = new File([blob], filename, { type:'image/png' });
                if (navigator.canShare && navigator.canShare({ files:[file] })) {
                    navigator.share({ files:[file], title:'Scheda ' + (gecko&&gecko.nome||'Geco') })
                        .catch(function(){ scaricaDiretto(canvas, filename); });
                } else { scaricaDiretto(canvas, filename); }
                btn.textContent = '📸 Salva Immagine'; btn.disabled = false;
            });
        });
    }

    function scaricaDiretto(canvas, filename) {
        var a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = filename; a.click();
    }

    // ── CARICA DATI ──
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    var d  = params.get('d');
    var g  = null;

    if (id) g = getGeckos().find(function(x){ return x.id === id; });
    if (!g && d) { try { g = JSON.parse(decodeURIComponent(escape(atob(d)))); } catch(e){} }

    if (g) render(g);
    else renderNotFound();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function(){});
    }
</script>
<script src="transitions.js"></script>
</body>
</html>
