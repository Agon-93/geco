<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password — Geco Leopardino</title>
    <meta name="theme-color" content="#111">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:-apple-system,'Segoe UI',sans-serif;
            background:#111; color:#f0f0f0; min-height:100vh;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:24px 20px;
        }
        .card { width:100%; max-width:400px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:24px; padding:32px 28px; }
        .top-row { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
        .btn-back { background:#2a2a2a; border:none; color:#f0f0f0; border-radius:10px; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .top-row h1 { font-size:20px; font-weight:800; }
        .desc { font-size:14px; color:#666; line-height:1.6; margin-bottom:20px; }
        .form-group { margin-bottom:14px; }
        label { display:block; font-size:12px; font-weight:700; color:#888; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
        input[type="email"] { width:100%; background:#111; border:1px solid #2a2a2a; border-radius:12px; color:#f0f0f0; padding:13px 16px; font-size:15px; outline:none; transition:border-color .2s; -webkit-appearance:none; }
        input:focus { border-color:#ff9940; }
        input::placeholder { color:#444; }
        .btn-primary { width:100%; background:#ff9940; color:#111; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:800; cursor:pointer; transition:opacity .15s; }
        .btn-primary:active { opacity:.8; }
        .btn-primary:disabled { background:#2a2a2a; color:#555; cursor:default; }
        .error-box { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); border-radius:12px; padding:12px 14px; font-size:13px; color:#ef4444; margin-bottom:14px; display:none; }
        .success-screen { display:none; text-align:center; padding:8px 0; }
        .success-screen .big-emoji { font-size:56px; display:block; margin-bottom:16px; }
        .success-screen h2 { font-size:18px; font-weight:800; margin-bottom:8px; }
        .success-screen p { font-size:14px; color:#888; line-height:1.6; }
        .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(0,0,0,.2); border-top-color:#111; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>
<div class="card">
    <div id="form-section">
        <div class="top-row">
            <button class="btn-back" onclick="history.back()">‹</button>
            <h1>Reset password</h1>
        </div>
        <p class="desc">Inserisci la tua email — ti mandiamo un link per impostare una nuova password.</p>
        <div class="error-box" id="error-box"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="tuaemail@esempio.com" autocomplete="email">
        </div>
        <button class="btn-primary" id="btn-reset" onclick="doReset()">Invia link di reset</button>
    </div>
    <div class="success-screen" id="success-screen">
        <span class="big-emoji">📧</span>
        <h2>Email inviata!</h2>
        <p>Controlla la tua casella — clicca il link per impostare la nuova password.<br><br>Controlla anche la cartella spam.</p>
        <a href="login.html" style="display:inline-block;margin-top:20px;background:#2a2a2a;color:#f0f0f0;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;text-decoration:none;">Torna al login</a>
    </div>
</div>
<script src="auth.js"></script>
<script>
    function showError(msg) { var e=document.getElementById('error-box'); e.textContent=msg; e.style.display='block'; }
    function setLoading(on) { var btn=document.getElementById('btn-reset'); btn.disabled=on; btn.innerHTML=on?'<span class="spinner"></span>':'Invia link di reset'; }
    function doReset() {
        var email = document.getElementById('email').value.trim();
        if (!email) { showError('Inserisci la tua email'); return; }
        setLoading(true);
        authResetPassword(email, function(err) {
            setLoading(false);
            if (err) { showError(err); return; }
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        });
    }
    document.addEventListener('keydown', function(e){ if(e.key==='Enter') doReset(); });
</script>
</body>
</html>
