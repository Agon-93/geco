<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nuova Password — Geco Leopardino</title>
    <meta name="theme-color" content="#111">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:-apple-system,'Segoe UI',sans-serif; background:#111; color:#f0f0f0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; }
        .card { width:100%; max-width:400px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:24px; padding:32px 28px; }
        .logo { text-align:center; margin-bottom:28px; }
        .logo .emoji { font-size:48px; display:block; margin-bottom:12px; }
        .logo h1 { font-size:20px; font-weight:800; }
        .logo p { font-size:13px; color:#666; margin-top:4px; }
        .form-group { margin-bottom:14px; }
        label { display:block; font-size:12px; font-weight:700; color:#888; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
        .input-wrap { position:relative; }
        input[type="password"], input[type="text"] { width:100%; background:#111; border:1px solid #2a2a2a; border-radius:12px; color:#f0f0f0; padding:13px 16px; font-size:15px; outline:none; transition:border-color .2s; -webkit-appearance:none; }
        input:focus { border-color:#ff9940; }
        input::placeholder { color:#444; }
        .toggle-pw { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:#555; cursor:pointer; font-size:16px; padding:4px; }
        .btn-primary { width:100%; background:#ff9940; color:#111; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:800; cursor:pointer; margin-top:8px; transition:opacity .15s; }
        .btn-primary:active { opacity:.8; }
        .btn-primary:disabled { background:#2a2a2a; color:#555; cursor:default; }
        .error-box { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); border-radius:12px; padding:12px 14px; font-size:13px; color:#ef4444; margin-bottom:14px; display:none; }
        .pw-strength { display:flex; gap:4px; margin-top:6px; }
        .pw-bar { height:3px; flex:1; border-radius:2px; background:#2a2a2a; transition:background .3s; }
        .pw-bar.weak { background:#ef4444; }
        .pw-bar.medium { background:#f59e0b; }
        .pw-bar.strong { background:#22c55e; }
        .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(0,0,0,.2); border-top-color:#111; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .loading-screen { display:none; text-align:center; padding:20px 0; color:#666; }
    </style>
</head>
<body>
<div class="card">
    <div class="loading-screen" id="loading-screen">
        <div style="font-size:32px;margin-bottom:12px;">🔑</div>
        <div>Verifica link in corso...</div>
    </div>
    <div id="form-section" style="display:none;">
        <div class="logo">
            <span class="emoji">🔑</span>
            <h1>Nuova password</h1>
            <p>Scegli una password sicura</p>
        </div>
        <div class="error-box" id="error-box"></div>
        <div class="form-group">
            <label>Nuova password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Min. 8 caratteri" autocomplete="new-password" oninput="checkStrength()">
                <button class="toggle-pw" type="button" onclick="togglePw('password')">👁</button>
            </div>
            <div class="pw-strength"><div class="pw-bar" id="bar1"></div><div class="pw-bar" id="bar2"></div><div class="pw-bar" id="bar3"></div></div>
        </div>
        <div class="form-group">
            <label>Conferma password</label>
            <div class="input-wrap">
                <input type="password" id="password2" placeholder="Ripeti la password" autocomplete="new-password">
                <button class="toggle-pw" type="button" onclick="togglePw('password2')">👁</button>
            </div>
        </div>
        <button class="btn-primary" id="btn-save" onclick="doSave()">Salva nuova password</button>
    </div>
    <div id="error-screen" style="display:none;text-align:center;padding:12px 0;">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">Link non valido o scaduto</div>
        <div style="font-size:13px;color:#666;margin-bottom:20px;">Richiedi un nuovo link di reset.</div>
        <a href="reset-password.html" style="display:inline-block;background:#ff9940;color:#111;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;text-decoration:none;">Richiedi nuovo link</a>
    </div>
</div>
<script src="auth.js"></script>
<script>
    document.getElementById('loading-screen').style.display = 'block';

    function togglePw(id) { var i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; }
    function checkStrength() {
        var pw=document.getElementById('password').value, s=0;
        if(pw.length>=8)s++; if(/[A-Z]/.test(pw)||/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw)||pw.length>=12)s++;
        var cls=['','weak','medium','strong'];
        for(var i=1;i<=3;i++) document.getElementById('bar'+i).className='pw-bar'+(i<=s?' '+cls[s]:'');
    }
    function showError(msg) { var e=document.getElementById('error-box'); e.textContent=msg; e.style.display='block'; }
    function setLoading(on) { var btn=document.getElementById('btn-save'); btn.disabled=on; btn.innerHTML=on?'<span class="spinner"></span>':'Salva nuova password'; }

    function doSave() {
        var pw=document.getElementById('password').value;
        var pw2=document.getElementById('password2').value;
        if(pw.length<8){ showError('La password deve avere almeno 8 caratteri'); return; }
        if(pw!==pw2){ showError('Le password non coincidono'); return; }
        setLoading(true);
        authUpdatePassword(pw, function(err) {
            setLoading(false);
            if(err){ showError(err); return; }
            authSignOut(function(){ window.location.href='login.html?pw_reset=1'; });
        });
    }

    // Gestisci il redirect con il token di recovery
    authHandleRedirect(function(type) {
        document.getElementById('loading-screen').style.display = 'none';
        if(type === 'recovery') {
            document.getElementById('form-section').style.display = 'block';
        } else {
            document.getElementById('error-screen').style.display = 'block';
        }
    });

    document.addEventListener('keydown', function(e){ if(e.key==='Enter') doSave(); });
</script>
</body>
</html>
